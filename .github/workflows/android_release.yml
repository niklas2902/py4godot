name: Android Release

on:
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: niklas2902/py4godot_android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.3"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate files
        run: python generate.py

      - name: Cythonize
        run: python cythonize_files.py

      - name: Build plugin
        run: >
          python build.py
          --target_platform=androidarm64
          --compiler=clang-android
          -buildtype=release

      - name: Create folder structure
        run: |
          mkdir -p build/installdir/addons
          cp -r build/py4godot-android build/installdir/addons

      - name: Create archive
        run: |
          cd build
          zip -r py4godot-android.zip installdir
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          compression-level: 0
          name: py4godot-android
          path: build/py4godot-android.zip
          retention-days: 30
