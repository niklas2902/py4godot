name: test windows
on:
  workflow_dispatch:
jobs:
  windows-build:
    if: ${{ needs.check_date.outputs.should_run != 'false' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: master
          submodules: 'recursive'

      - name: Set up Python 3.11.3
        uses: actions/setup-python@v2
        with:
          python-version: "3.11.3"

      - name: Cache py4godot/classes directory
        id: cache-py4godot-classes
        uses: actions/cache@v3
        with:
          path: py4godot/classes
          key: ${{ runner.os }}-py4godot-classes-${{ hashFiles('**/generate_classes.py', '**/generate_pxd_bridge.py', '**/extension_api.json') }}
          restore-keys: |
            ${{ runner.os }}-py4godot-classes-

      - name: Run Python script and check result
        shell: bash
        run: |
          set +e
          python meson_scripts/does_cache_exist.py
          exit_code=$?
          if [ $exit_code -eq 0 ]; then
            echo "Cache exists"
            # Add any actions you want to take on success
          else
            echo "Cache does not exist"
            exit 0
          fi
          set -e

      - name: Print variables
        run: |
          python meson_scripts/variables.py

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install flake8

      - name: Print structure
        run: python meson_scripts/print_tools.py

      - name: Generate files
        run: python generate.py

      - name: Conditional cythonize
        shell: bash
        run: python cythonize_files.py

      - name: Set up build environment
        shell: pwsh
        run: |
          # Use MinGW compilers natively on Windows
          echo "CC=gcc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CXX=g++" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "AR=ar" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "STRIP=strip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: python build.py --target_platform=windows64 --compiler=msvc -create_plugin=False -buildtype=release -run_tests=False -download_godot=True

      - name: Create cache
        run: python meson_scripts/create_cache.py

      - name: Print structure
        run: python meson_scripts/print_tools.py

      - name: Copy MinGW runtime DLLs
        shell: pwsh
        run: |
          # Create a directory for the DLLs
          New-Item -ItemType Directory -Force -Path build\py4godot\mingw_dlls | Out-Null

          # Copy essential MinGW runtime DLLs from MSYS2 installation
          $mingwBin = "C:\msys64\mingw64\bin"
          $dllsToCopy = @(
              "libgcc_s_seh-1.dll",
              "libstdc++-6.dll",
              "libwinpthread-1.dll"
          )

          foreach ($dll in $dllsToCopy) {
              $src = Join-Path $mingwBin $dll
              if (Test-Path $src) {
                  Copy-Item $src -Destination build\py4godot\mingw_dlls\ -Force
                  Write-Host "Copied: $dll"
              } else {
                  Write-Host "Not found: $dll"
              }
          }

          # Optionally copy any additional DLLs that the build may depend on.
          # Be selective here — copying every DLL from mingw64\bin would bloat the artifact.
          # Add extra DLL names above if the build complains about missing libraries.

          # List what DLLs were copied
          Write-Host "Copied DLLs:"
          Get-ChildItem build\py4godot\mingw_dlls\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: py4godot-windows64
          path: .
          retention-days: 30